<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blob</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x5eb8b8, 1);
renderer.outputEncoding  = THREE.sRGBEncoding;
renderer.physicallyCorrectLights = true;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 5;

// ── Gradient texture ──────────────────────────────────────────────────────────
function createGradientTexture() {
  const S = 512;
  const c = document.createElement('canvas');
  c.width = c.height = S;
  const ctx = c.getContext('2d');

  // left #7c3aed(purple) → center #00d4ff(accent) → right #5b21b6(deep purple)
  const h = ctx.createLinearGradient(0, 0, S, 0);
  h.addColorStop(0,    '#7c3aed');
  h.addColorStop(0.45, '#00d4ff');
  h.addColorStop(0.7,  '#0ea5e9');
  h.addColorStop(1,    '#5b21b6');
  ctx.fillStyle = h;
  ctx.fillRect(0, 0, S, S);

  // diagonal accent overlay
  const d = ctx.createLinearGradient(0, S, S, 0);
  d.addColorStop(0,    'rgba(0,212,255,0)');
  d.addColorStop(0.45, 'rgba(0,212,255,0.35)');
  d.addColorStop(0.55, 'rgba(0,212,255,0.35)');
  d.addColorStop(1,    'rgba(0,212,255,0)');
  ctx.fillStyle = d;
  ctx.fillRect(0, 0, S, S);

  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}

// ── Stefan Gustavson periodic Perlin noise (GLSL) ─────────────────────────────
const NOISE_GLSL = /* glsl */`
vec3 mod289v3(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 mod289v4(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 permute(vec4 x)  { return mod289v4(((x * 34.0) + 1.0) * x); }
vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
vec3 fade(vec3 t) { return t * t * t * (t * (t * 6.0 - 15.0) + 10.0); }

float pnoise(vec3 P, vec3 rep) {
  vec3 Pi0 = mod(floor(P), rep);
  vec3 Pi1 = mod(Pi0 + vec3(1.0), rep);
  Pi0 = mod289v3(Pi0); Pi1 = mod289v3(Pi1);
  vec3 Pf0 = fract(P);
  vec3 Pf1 = Pf0 - vec3(1.0);
  vec4 ix  = vec4(Pi0.x, Pi1.x, Pi0.x, Pi1.x);
  vec4 iy  = vec4(Pi0.yy, Pi1.yy);
  vec4 iz0 = Pi0.zzzz;
  vec4 iz1 = Pi1.zzzz;
  vec4 ixy  = permute(permute(ix) + iy);
  vec4 ixy0 = permute(ixy + iz0);
  vec4 ixy1 = permute(ixy + iz1);
  vec4 gx0 = ixy0 * (1.0 / 7.0);
  vec4 gy0 = fract(floor(gx0) * (1.0 / 7.0)) - 0.5;
  gx0 = fract(gx0);
  vec4 gz0 = vec4(0.5) - abs(gx0) - abs(gy0);
  vec4 sz0 = step(gz0, vec4(0.0));
  gx0 -= sz0 * (step(0.0, gx0) - 0.5);
  gy0 -= sz0 * (step(0.0, gy0) - 0.5);
  vec4 gx1 = ixy1 * (1.0 / 7.0);
  vec4 gy1 = fract(floor(gx1) * (1.0 / 7.0)) - 0.5;
  gx1 = fract(gx1);
  vec4 gz1 = vec4(0.5) - abs(gx1) - abs(gy1);
  vec4 sz1 = step(gz1, vec4(0.0));
  gx1 -= sz1 * (step(0.0, gx1) - 0.5);
  gy1 -= sz1 * (step(0.0, gy1) - 0.5);
  vec3 g000 = vec3(gx0.x,gy0.x,gz0.x); vec3 g100 = vec3(gx0.y,gy0.y,gz0.y);
  vec3 g010 = vec3(gx0.z,gy0.z,gz0.z); vec3 g110 = vec3(gx0.w,gy0.w,gz0.w);
  vec3 g001 = vec3(gx1.x,gy1.x,gz1.x); vec3 g101 = vec3(gx1.y,gy1.y,gz1.y);
  vec3 g011 = vec3(gx1.z,gy1.z,gz1.z); vec3 g111 = vec3(gx1.w,gy1.w,gz1.w);
  vec4 norm0 = taylorInvSqrt(vec4(dot(g000,g000),dot(g010,g010),dot(g100,g100),dot(g110,g110)));
  g000 *= norm0.x; g010 *= norm0.y; g100 *= norm0.z; g110 *= norm0.w;
  vec4 norm1 = taylorInvSqrt(vec4(dot(g001,g001),dot(g011,g011),dot(g101,g101),dot(g111,g111)));
  g001 *= norm1.x; g011 *= norm1.y; g101 *= norm1.z; g111 *= norm1.w;
  float n000 = dot(g000, Pf0);
  float n100 = dot(g100, vec3(Pf1.x, Pf0.yz));
  float n010 = dot(g010, vec3(Pf0.x, Pf1.y, Pf0.z));
  float n110 = dot(g110, vec3(Pf1.xy, Pf0.z));
  float n001 = dot(g001, vec3(Pf0.xy, Pf1.z));
  float n101 = dot(g101, vec3(Pf1.x, Pf0.y, Pf1.z));
  float n011 = dot(g011, vec3(Pf0.x, Pf1.yz));
  float n111 = dot(g111, Pf1);
  vec3  fade_xyz = fade(Pf0);
  vec4  n_z  = mix(vec4(n000,n100,n010,n110), vec4(n001,n101,n011,n111), fade_xyz.z);
  vec2  n_yz = mix(n_z.xy, n_z.zw, fade_xyz.y);
  return 2.2 * mix(n_yz.x, n_yz.y, fade_xyz.x);
}
`;

// ── Blob displacement functions (GLSL) ───────────────────────────────────────
const FUNCTIONS_GLSL = /* glsl */`
uniform float time;
uniform float radius;
uniform float distort;
uniform float frequency;
uniform float surfaceDistort;
uniform float surfaceFrequency;
uniform float surfaceTime;
uniform float numberOfWaves;
uniform float fixNormals;
uniform float surfacePoleAmount;
uniform float gooPoleAmount;
uniform float noisePeriod;

float f(vec3 point) {
  float yPos          = smoothstep(-1.0, 1.0, point.y);
  float amount        = sin(yPos * 3.1415926538);
  float wavePoleAmount = mix(amount, 1.0, surfacePoleAmount);
  float gooPoleAmt    = mix(amount, 1.0, gooPoleAmount);

  float goo = pnoise(
    vec3(point / frequency + mod(time, noisePeriod)),
    vec3(noisePeriod)
  ) * pow(distort, 2.0);

  float surfaceNoise = pnoise(
    vec3(point / surfaceFrequency + mod(surfaceTime, noisePeriod)),
    vec3(noisePeriod)
  );
  float waves = (
    point.x * sin((point.y + surfaceNoise) * 3.1415926538 * numberOfWaves) +
    point.z * cos((point.y + surfaceNoise) * 3.1415926538 * numberOfWaves)
  ) * 0.01 * pow(surfaceDistort, 2.0);

  return waves * wavePoleAmount + goo * gooPoleAmt;
}

vec3 orthogonal(vec3 v) {
  return normalize(abs(v.x) > abs(v.z) ? vec3(-v.y, v.x, 0.0) : vec3(0.0, -v.z, v.y));
}
`;

// ── Uniforms ──────────────────────────────────────────────────────────────────
const uniforms = {
  time:              { value: 0 },
  surfaceTime:       { value: 0 },
  distort:           { value: 0.5 },
  frequency:         { value: 1.5 },
  surfaceDistort:    { value: 1.0 },
  surfaceFrequency:  { value: 1.0 },
  numberOfWaves:     { value: 4.0 },
  surfacePoleAmount: { value: 1.0 },
  gooPoleAmount:     { value: 1.0 },
  noisePeriod:       { value: 21.0 },
  fixNormals:        { value: 1.0 },
  radius:            { value: 1.0 },
};
const speed        = 1.0;
const surfaceSpeed = 1.0;

// ── Material ──────────────────────────────────────────────────────────────────
const material = new THREE.MeshPhysicalMaterial({
  roughness:         0.14,
  metalness:         0,
  clearcoat:         1.0,
  clearcoatRoughness: 0.7,
  color:             new THREE.Color('#ffffff'),
  map:               createGradientTexture(),
});

material.onBeforeCompile = (shader) => {
  // Merge our uniforms into the shader
  Object.assign(shader.uniforms, uniforms);

  shader.vertexShader = shader.vertexShader
    // 1. Inject pnoise + blob functions after #include <common>
    .replace(
      '#include <common>',
      `#include <common>\n${NOISE_GLSL}\n${FUNCTIONS_GLSL}`
    )
    // 2. At the very start of main(), compute displaced position & normal
    .replace(
      'void main() {',
      `void main() {
  // ── Blob displacement ──────────────────────────────
  vec3 displacedPosition = position + normalize(normal) * f(position);
  vec3 displacedNormal   = normalize(normal);

  if (fixNormals > 0.5) {
    float offset     = 0.5 / 512.0;
    vec3 tangent     = orthogonal(normal);
    vec3 bitangent   = normalize(cross(normal, tangent));
    vec3 nb1         = position + tangent   * offset;
    vec3 nb2         = position + bitangent * offset;
    vec3 dn1         = nb1 + normal * f(nb1);
    vec3 dn2         = nb2 + normal * f(nb2);
    vec3 dTangent    = dn1 - displacedPosition;
    vec3 dBitangent  = dn2 - displacedPosition;
    displacedNormal  = normalize(cross(dTangent, dBitangent));
  }
  // ──────────────────────────────────────────────────`
    )
    // 3. Use displaced position instead of built-in displacementmap
    .replace(
      '#include <displacementmap_vertex>',
      'transformed = displacedPosition;'
    )
    // 4. Use displaced normal — patch the defaultnormal_vertex chunk inline
    .replace(
      '#include <defaultnormal_vertex>',
      THREE.ShaderChunk.defaultnormal_vertex.replace(
        'vec3 transformedNormal = objectNormal;',
        'vec3 transformedNormal = displacedNormal;'
      )
    );
};

// Cache key so Three.js knows this is a custom variant
material.customProgramCacheKey = () => 'blobmixer-v1';

// ── Mesh ──────────────────────────────────────────────────────────────────────
const geometry = new THREE.SphereBufferGeometry(1, 256, 341);
const mesh     = new THREE.Mesh(geometry, material);
scene.add(mesh);

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(1, 2, 3);
scene.add(dirLight);

// Simple environment for clearcoat reflections
(function setupEnv() {
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const ec = document.createElement('canvas');
  ec.width = 256; ec.height = 128;
  const ectx = ec.getContext('2d');
  const eg = ectx.createLinearGradient(0, 0, 0, 128);
  eg.addColorStop(0,   '#c4d4ff');
  eg.addColorStop(0.5, '#ffffff');
  eg.addColorStop(1,   '#ffe8f8');
  ectx.fillStyle = eg;
  ectx.fillRect(0, 0, 256, 128);
  const etex = new THREE.CanvasTexture(ec);
  etex.mapping = THREE.EquirectangularReflectionMapping;
  const envRT = pmrem.fromEquirectangular(etex);
  scene.environment = envRT.texture;
  pmrem.dispose();
  etex.dispose();
})();


// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ── Loop ──────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

(function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  uniforms.time.value        = (uniforms.time.value        + delta * (speed        / 3)) % 21.0;
  uniforms.surfaceTime.value = (uniforms.surfaceTime.value + delta * (surfaceSpeed / 3)) % 21.0;
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
