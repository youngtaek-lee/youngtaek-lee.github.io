  <link rel="stylesheet" href="assets/css/reset.css" />

<body>

  <!-- ========================
    Header
  ========================= -->
  <header class="header">
    <a href="/" class="header__logo">Lee Young Taek.</a>
    <nav class="header__nav">
      <button class="menu-btn" id="menuBtn" aria-label="메뉴 열기">MENU</button>
    </nav>
  </header>

  <!-- ========================
    Menu Overlay
  ========================= -->
  <div class="menu-overlay" id="menuOverlay" aria-hidden="true">
    <div class="menu-overlay__backdrop" id="menuBackdrop"></div>
    <div class="menu-overlay__panel">
      <button class="menu-overlay__close" id="menuClose" aria-label="메뉴 닫기">CLOSE</button>
      <nav class="menu-overlay__nav">
        <a href="/about" class="menu-overlay__link">About</a>
        <a href="/works" class="menu-overlay__link">Works</a>
        <a href="/contact" class="menu-overlay__link">Contact</a>
      </nav>
      <div class="menu-overlay__footer">
        <a href="https://github.com/youngtaek-lee" class="menu-overlay__footer-link" target="_blank" rel="noopener">GitHub</a>
        <a href="mailto:brant7100@gmail.com" class="menu-overlay__footer-link">Email</a>
        <a href="#" class="menu-overlay__footer-link" target="_blank" rel="noopener">Instagram</a>
        <a href="#" class="menu-overlay__footer-link" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
  </div>

  <!-- ========================
    Bottom Nav
  ========================= -->
  <nav class="bottom-nav" id="bottomNav" aria-label="하단 메뉴">
    <button class="bottom-nav__top" id="scrollTopBtn" aria-label="맨 위로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>
    <div class="bottom-nav__links">
      <a href="/about" class="bottom-nav__link">About</a>
      <a href="/works" class="bottom-nav__link">Works</a>
      <a href="/contact" class="bottom-nav__link bottom-nav__link--cta">Contact</a>
    </div>
  </nav>

  <main>
    <div id="home-view">

      <!-- ========================
        HERO
      ========================= -->
      <section class="hero" id="hero">
        <div class="hero__title">
          <div class="hero__hidden-space"></div>
          <p class="hero__tagline"><span class="hero__letter--under">S</span><span class="hero__letter--under">C</span><span class="hero__letter--under">R</span><span class="hero__letter--over" data-hi="4">O</span><span class="hero__letter--over" data-hi="2">L</span><span class="hero__letter--over" data-hi="3">L</span><span class="hero__letter--under">W</span><span class="hero__letter--over" data-hi="0">H</span><span class="hero__letter--over" data-hi="1">E</span><span class="hero__letter--under">E</span><span class="hero__letter--under">L</span></p>
        </div>
      </section>


      <!-- ========================
        WORKS
      ========================= -->
      <section class="works" id="works">
        <div class="works__inner">
          <p class="works__label">Works</p>
          <ul class="works__list" id="works-list">
            <!-- JS 렌더링 -->
          </ul>
        </div>
        <img class="works__thumb" id="works-thumb" alt="" aria-hidden="true" />
      </section>

    </div><!-- /#home-view -->
    <div id="subpage-view" aria-hidden="true"></div>
  </main>

  <!-- ========================
    Footer (Scroll Reveal)
  ========================= -->
  <div class="statement">
    <p class="statement__text">DEVELOPMENT</p>
  </div>

  <footer class="footer">
    <div class="footer__contact">
      <h2 class="footer__title">좋은 작업은<br>대화에서 시작됩니다.</h2>
      <a href="mailto:brant7100@gmail.com" class="footer__email">brant7100@gmail.com</a>
      <div class="footer__sns">
        <a href="https://github.com/youngtaek-lee" class="footer__sns-link" target="_blank" rel="noopener">GitHub</a>
        <a href="#" class="footer__sns-link" target="_blank" rel="noopener">Instagram</a>
        <a href="#" class="footer__sns-link" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
    <div class="footer__bottom">
      <p class="footer__copy">© 2026 Designed &amp; Published by Lee Youngtaek</p>
      <nav class="footer__nav">
        <a href="/about" class="footer__link">About</a>
        <a href="/works" class="footer__link">Works</a>
      </nav>
    </div>

  <script src="assets/js/pages/contact.js" defer></script>
  <script src="assets/js/router.js" defer></script>
  <script src="assets/js/main.js" defer></script>

</html>
